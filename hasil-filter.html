<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Hasil Filter - NusaBeli</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet" />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: #d9d9d9;
        display: flex;
        justify-content: center;
      }

      .mobile {
        width: 390px;
        height: 844px;
        background: #f6f7f7;
        position: relative;
        overflow: hidden;
      }

      /* HEADER */

      .header {
        background: #f6f7f7;
        padding: 24px 16px 16px;
      }

      .top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .logo {
        font-size: 28px;
        font-weight: 600;
        color: #006b68;
      }

      .top-icons {
        display: flex;
        gap: 18px;
      }

      .top-icons .material-symbols-outlined {
        font-size: 34px;
        color: #4b5563;
      }

      /* SEARCH */

      .search-box {
        height: 60px;
        background: #ececec;
        border-radius: 14px;

        display: flex;
        align-items: center;

        padding: 0 16px;
        gap: 10px;
      }

      .search-box .material-symbols-outlined {
        color: #6b7280;
        font-size: 34px;
      }

      .search-input {
        flex: 1;
        font-size: 18px;
        color: #222;
      }

      /* FILTER BAR */

      .filter-bar {
        background: white;
        border-top: 1px solid #e5e7eb;
        border-bottom: 1px solid #e5e7eb;

        padding: 14px 16px;

        display: flex;
        align-items: center;
        gap: 14px;
      }

      .filter-btn {
        height: 46px;
        padding: 0 18px;

        border: 1px solid #d1d5db;
        border-radius: 14px;

        background: white;

        display: flex;
        align-items: center;
        gap: 8px;

        font-size: 16px;
      }

      .divider {
        width: 1px;
        height: 42px;
        background: #d1d5db;
      }

      .verify-chip {
        height: 46px;
        background: #f3f4f6;
        border-radius: 24px;

        display: flex;
        align-items: center;
        gap: 8px;

        padding: 0 16px;

        font-size: 15px;
      }

      .verify-chip .material-symbols-outlined {
        color: #1565c0;
      }

      /* CONTENT */

      .content {
        padding: 28px 16px 120px;
      }

      .result-text {
        font-size: 18px;
        color: #444;
        margin-bottom: 26px;
      }

      /* PRODUCT CARD */

      .product-card {
        width: 320px;
        background: white;
        border-radius: 22px;
        overflow: hidden;

        border: 1px solid #e5e7eb;

        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
      }

      .product-image {
        position: relative;
      }

      .product-image img {
        width: 100%;
        height: 300px;
        object-fit: cover;
      }

      .badge {
        position: absolute;
        top: 14px;
        left: 14px;

        background: #1565c0;
        color: white;

        border-radius: 20px;

        padding: 6px 14px;

        font-size: 14px;

        display: flex;
        align-items: center;
        gap: 6px;
      }

      .badge .material-symbols-outlined {
        font-size: 18px;
        color: white;
      }

      .product-info {
        padding: 16px;
      }

      .product-title {
        font-size: 20px;
        line-height: 1.4;
        color: #222;
      }

      .product-price {
        margin-top: 14px;
        color: #006b68;
        font-size: 22px;
        font-weight: 500;
      }

      .location {
        margin-top: 10px;

        display: flex;
        align-items: center;
        gap: 6px;

        color: #555;
      }

      .location .material-symbols-outlined {
        font-size: 20px;
      }

      .rating {
        margin-top: 12px;
        color: #555;
        font-size: 15px;
      }

      /* NAVBAR */

      .navbar {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 92px;

        background: white;

        border-top: 1px solid #e5e7eb;

        display: flex;
        justify-content: space-around;
        align-items: center;
      }

      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;

        color: #444;
        text-decoration: none;
      }

      .nav-item .material-symbols-outlined {
        font-size: 34px;
      }

      .nav-item div {
        font-size: 14px;
      }

      .nav-item.active {
        width: 92px;
        height: 92px;
        border-radius: 50%;

        background: #f2a75e;

        margin-top: -40px;

        justify-content: center;
      }
    </style>
  </head>

  <body>
    <div class="mobile">
      <!-- HEADER -->

      <div class="header">
        <div class="top-row">
          <div class="logo">NusaBeli</div>

          <div class="top-icons">
            <span class="material-symbols-outlined"> shopping_cart </span>

            <span class="material-symbols-outlined"> menu </span>
          </div>
        </div>

        <div class="search-box">
          <span class="material-symbols-outlined"> search </span>

          <div class="search-input">Batik Biru</div>

          <span class="material-symbols-outlined" style="color: #006b68">
            mic
          </span>
        </div>
      </div>

      <!-- FILTER BAR -->

      <div class="filter-bar">
        <button
          class="filter-btn"
          onclick="window.location.href = 'filter.html'">
          <span class="material-symbols-outlined"> tune </span>

          Filter
        </button>

        <div class="divider"></div>

        <div class="verify-chip">
          <span class="material-symbols-outlined"> verified </span>

          Hanya UMKM Terverifikasi
        </div>
      </div>

      <!-- CONTENT -->

      <div class="content">
        <div class="result-text">Menampilkan 1 hasil untuk "Batik Biru"</div>

        <div
          class="product-card"
          onclick="window.location.href = 'detail-produk.html'">
          <div class="product-image">
            <img src="assets/batik1.png" />

            <div class="badge">
              <span class="material-symbols-outlined"> verified </span>

              UMKM
            </div>
          </div>

          <div class="product-info">
            <div class="product-title">
              Kemeja Batik Biru<br />
              Motif Mega Mendung
            </div>

            <div class="product-price">Rp 150.000</div>

            <div class="location">
              <span class="material-symbols-outlined"> location_on </span>

              Cirebon
            </div>

            <div class="rating">⭐ 4.8 | Terjual 120</div>
          </div>
        </div>
      </div>

      <!-- NAVBAR -->

      <div class="navbar">
        <div class="nav-item">
          <span class="material-symbols-outlined"> home </span>

          <div>Beranda</div>
        </div>

        <div class="nav-item active">
          <span class="material-symbols-outlined"> search </span>

          <div>Cari</div>
        </div>

        <div class="nav-item">
          <span class="material-symbols-outlined"> shopping_bag </span>

          <div>Pesanan</div>
        </div>

        <div class="nav-item">
          <span class="material-symbols-outlined"> person </span>

          <div>Profil</div>
        </div>
      </div>
    </div>
  </body>
</html>
