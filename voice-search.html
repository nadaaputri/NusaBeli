<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NusaBeli - Voice Search</title>

    <link rel="stylesheet" href="style.css" />

    <style>
      .voice-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.45);

        display: flex;
        justify-content: center;
        align-items: center;
      }

      .voice-modal {
        width: 320px;
        background: white;
        border-radius: 28px;
        padding: 40px 24px;
        text-align: center;
      }

      .voice-circle {
        width: 160px;
        height: 160px;
        margin: auto;

        border-radius: 50%;

        background: #eef7f7;

        display: flex;
        justify-content: center;
        align-items: center;
      }

      .voice-circle-inner {
        width: 90px;
        height: 90px;

        border-radius: 50%;

        background: #006b68;

        display: flex;
        justify-content: center;
        align-items: center;
      }

      .voice-circle-inner img {
        width: 40px;
        height: 40px;
      }

      .voice-title {
        margin-top: 28px;
        font-size: 26px;
        font-weight: 700;
        color: #333;
      }

      .voice-subtitle {
        margin-top: 12px;
        font-size: 16px;
        color: #666;
        line-height: 1.6;
      }

      .voice-keyword {
        color: #006b68;
        font-weight: 600;
      }

      .voice-action {
        margin-top: 35px;
      }

      .voice-button {
        display: inline-block;

        padding: 12px 32px;

        border: 1px solid #d9d9d9;

        border-radius: 24px;

        color: #444;

        background: white;

        font-size: 15px;
      }
    </style>
  </head>

  <body>
    <div class="voice-overlay">
      <div class="voice-modal">
        <div class="voice-circle">
          <div class="voice-circle-inner">
            <img src="assets/mic-white.png" alt="Microphone" />
          </div>
        </div>

        <div class="voice-title">Mendengarkan...</div>

        <div class="voice-subtitle">
          Silakan ucapkan nama produk yang ingin dicari
        </div>

        <div class="voice-subtitle">
          Contoh:
          <span class="voice-keyword"> Batik Biru </span>
        </div>

        <div class="voice-action">
          <a href="hasil-pencarian.html" class="voice-button"> Selesai </a>
        </div>
      </div>
    </div>
  </body>
</html>
